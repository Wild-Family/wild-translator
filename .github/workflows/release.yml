name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "$release_tag" | grep -Eq '^v[0-9]+(\.[0-9]+){2}$'; then
            echo "Release tag must match vX.Y.Z, got: $release_tag" >&2
            exit 1
          fi

          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Verify release does not exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists. Delete it before rerunning this workflow." >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.13.1
          run_install: false

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        run: node scripts/verify-release-version.mjs

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package extension
        run: pnpm release:package

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            "release/wild-punch-${RELEASE_TAG}.zip" \
            release/SHA256SUMS \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --generate-notes
